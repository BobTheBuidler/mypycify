            exit 1
          fi

  test-normalize-without-push:
    name: normalize-source true without push-source true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
