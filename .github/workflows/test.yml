            exit 1
          fi

  test-push-source-missing-triggers:
    name: push-source true with no trigger-pr-number or trigger-branch-name
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (push-source true, missing triggers)
        id: mypycify
        uses: ./
        with:
          python-version: '3.11'
          hash-key: pyproject.toml
          push-source: true
        continue-on-error: true
      - name: Assert action failed as expected
        run: |
          if [ "${{ steps.mypycify.outcome }}" = "failure" ]; then
            echo "Action failed as expected."
            exit 0
          else
            echo "Action did not fail as expected."
            exit 1
          fi

  test-poosh-passthrough:
    name: Poosh publish controls are passed through
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert poosh wiring
        run: |
          python3 - <<'PY'
          from pathlib import Path

          action = Path("action.yml").read_text()
          expr = lambda value: "${" + "{ " + value + " }}"
          pr_branch_expr = "inputs.pr-branch || format('mypycify/{0}', inputs.trigger-branch-name)"
          expected = [
              "uses: BobTheBuidler/poosh@v0.1.0",
              f"direct-push: {expr('inputs.direct-push')}",
              f"pr-branch: {expr(pr_branch_expr)}",
              f"pr-base: {expr('inputs.pr-base')}",
              f"pr-branch-strategy: {expr('inputs.pr-branch-strategy')}",
          ]
          missing = [value for value in expected if value not in action]
          if missing:
              raise SystemExit(f"missing poosh passthrough values: {missing!r}")
          PY
