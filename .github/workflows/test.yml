name: Test mypycify Action

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-default:
    name: Build (no ccache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (source, no ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          ccache: 'false'
          hash-key: pyproject.toml
      - name: Check for built wheel
        run: |
          ls dist/
          test -f dist/dummy-0.1-py3-none-any.whl
      
  test-source:
    name: Build from source (no ccache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (source, no ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          build-from: source
          ccache: 'false'
          hash-key: pyproject.toml
      - name: Check for built wheel
        run: |
          ls dist/
          test -f dist/dummy-0.1-py3-none-any.whl

  test-sdist:
    name: Build from sdist (no ccache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (sdist, no ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          build-from: sdist
          ccache: 'false'
          hash-key: pyproject.toml
      - name: Check for built wheel
        run: |
          ls dist/
          test -f dist/dummy-0.1-py3-none-any.whl

  test-default-ccache:
    name: Build (with ccache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (source, with ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          ccache: 'true'
          hash-key: pyproject.toml
      - name: Check for built wheel
        run: |
          ls dist/
          test -f dist/dummy-0.1-py3-none-any.whl

  test-source-ccache:
    name: Build from source (with ccache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (source, with ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          build-from: source
          ccache: 'true'
          hash-key: pyproject.toml
      - name: Check for built wheel
        run: |
          ls dist/
          test -f dist/dummy-0.1-py3-none-any.whl

  test-sdist-ccache:
    name: Build from sdist (with ccache)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (sdist, with ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          build-from: sdist
          ccache: 'true'
          hash-key: pyproject.toml
      - name: Check for built wheel
        run: |
          ls dist/
          test -f dist/dummy-0.1-py3-none-any.whl

  test-pip-http-cache-cleanup:
    name: Pip HTTP cache is cleaned
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
          printf '%s\n' "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" > cache-key.txt
      - name: Seed pip HTTP cache directories
        run: |
          cache_dir="$(python3 -m pip cache dir)"
          mkdir -p "$cache_dir/http" "$cache_dir/http-v2"
          echo sentinel > "$cache_dir/http/sentinel"
          echo sentinel > "$cache_dir/http-v2/sentinel"
          echo "PIP_CACHE_DIR=$cache_dir" >> "$GITHUB_ENV"
      - name: Run mypycify action (source, no ccache)
        uses: ./
        with:
          python-version: '3.11'
          pip-cache-dependency-path: pyproject.toml
          ccache: 'false'
          hash-key: cache-key.txt
      - name: Assert pip HTTP cache directories were cleaned
        run: |
          cache_dir="$(python -m pip cache dir)"
          test "$cache_dir" = "$PIP_CACHE_DIR"
          if [ -d "$cache_dir/http" ] || [ -d "$cache_dir/http-v2" ]; then
            echo "pip HTTP cache directories were not cleaned:"
            find "$cache_dir" -maxdepth 2 -type d -name 'http*' -print
            exit 1
          fi

  test-invalid-build-from:
    name: Invalid build-from value
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (invalid build-from)
        id: mypycify
        uses: ./
        with:
          python-version: '3.11'
          hash-key: pyproject.toml
          build-from: foo
        continue-on-error: true
      - name: Assert action failed as expected
        run: |
          if [ "${{ steps.mypycify.outcome }}" = "failure" ]; then
            echo "Action failed as expected."
            exit 0
          else
            echo "Action did not fail as expected."
            exit 1
          fi

  test-invalid-ccache:
    name: Invalid ccache value
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
          mkdir dummy
          echo '' > dummy/__init__.py
      - name: Run mypycify action (invalid ccache)
        id: mypycify
        uses: ./
        with:
          python-version: '3.11'
          hash-key: pyproject.toml
          ccache: maybe
        continue-on-error: true
      - name: Assert action failed as expected
        run: |
          if [ "${{ steps.mypycify.outcome }}" = "failure" ]; then
            echo "Action failed as expected."
            exit 0
          else
            echo "Action did not fail as expected."
            exit 1
          fi

  test-missing-python-version:
    name: Missing python-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up minimal Python project
        run: |
          echo '[build-system]' > pyproject.toml
          echo 'requires = ["setuptools", "wheel"]' >> pyproject.toml
          echo 'build-backend = "setuptools.build_meta"' >> pyproject.toml
          echo 'from setuptools import setup; setup(name="dummy", version="0.1")' > setup.py
